services: 

  nginx:
    build:
      context: ./nginx
    ports:
      - "8000:80"
    networks:
        - notes-app
    restart: always
    depends_on: 
        - django

  db:
    container_name: mysql
    image: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - notes-app
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "-uroot", "-proot"]
      interval: 10s
      retries: 5
      start_period: 60s

  django:
    build:
      context: .
    container_name: django_cont
    command: >
      sh -c "sleep 20 && python manage.py migrate --no-input && gunicorn notesapp.wsgi --bind 0.0.0.0:8000"

    env_file:
      - ".env"
    restart: always
    depends_on: 
      - db
    networks:
      - notes-app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  notes-app: 
    driver: bridge

volumes:
  mysql-data:
